name: Deploy Pulse to GitHub Pages

# Builds and publishes the dashboard. A scheduled run fetches fresh LLM Overwatch
# data in the cloud every ~15 min, so the phone always sees current numbers with
# your PC off. No API key, no secrets needed.

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *'    # every ~5 min (best-effort; GitHub cron floor is ~5 min)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Fetch latest data (no key needed)
        run: python fetch_overwatch.py || echo "fetch failed — site will show SAMPLE data this run"

      # --- Claude Fable latency from Artificial Analysis (separate source) ---
      # AA free tier = 100 requests/day and AA only refreshes ~every 3h. This workflow
      # runs every 5 min, so we fetch AA ONLY at the 3h boundary and cache the result;
      # every other deploy reuses the cached data_fable.js. Keeps us far under quota.
      - name: Compute 3h cache bucket (UTC)
        id: aa_bucket
        run: echo "key=$(date -u +%Y%m%d)-$(( 10#$(date -u +%H) / 3 ))" >> "$GITHUB_OUTPUT"

      - name: Restore last Fable median (Artificial Analysis)
        id: fable_cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: data_fable.js
          key: fable-aa-${{ steps.aa_bucket.outputs.key }}
          restore-keys: |
            fable-aa-

      # Fetch only when THIS 3h bucket isn't cached yet. cache-hit is 'true' only on an
      # exact key match, so this fires on the first run of each 3h window whenever it
      # lands — robust to GitHub's irregular cron timing — and stays under AA's 100/day.
      # restore-keys still hands us the previous bucket's file as a fallback if a fetch fails.
      - name: Fetch Fable median (once per 3h bucket; protects AA daily quota)
        if: steps.fable_cache.outputs.cache-hit != 'true'
        env:
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
        run: python fetch_aa.py || echo "AA fetch failed — Fable card falls back to last cached value"

      - name: Stage site (only the files the page needs)
        run: |
          mkdir -p _site
          cp index.html data.sample.js _site/
          cp data.js _site/ 2>/dev/null || true
          cp data_fable.js _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
